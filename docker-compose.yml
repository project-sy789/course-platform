services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: course
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: course
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Self-hosted SMTP via Postfix. Used by the API as a relay-or-direct mail
  # transport — cheaper and more private than Resend/Postmark, but you OWN
  # the deliverability. For production you MUST set up:
  #   * PTR (reverse DNS) for the VPS IP, matching MAIL_HOSTNAME
  #   * SPF record on the sending domain
  #   * DKIM signing (set OPENDKIM_KEYS via volume + DOMAIN_VHOST)
  #   * DMARC record on the sending domain
  # Outbound port 25 is blocked on most hosting; either use a smarthost
  # (RELAY_HOST=smtp.sendgrid.net etc.) or open 587 on the receiving side.
  mailserver:
    image: boky/postfix:v4.0.0
    environment:
      ALLOWED_SENDER_DOMAINS: ${MAIL_DOMAIN}
      HOSTNAME: ${MAIL_HOSTNAME}
      # Optional smarthost: leave empty to deliver direct over port 25.
      # Set to e.g. "[smtp.sendgrid.net]:587" + RELAYHOST_USERNAME/PASSWORD
      # to relay through a transactional provider while keeping local delivery
      # semantics (api just talks to mailserver:587).
      RELAYHOST: ${MAIL_RELAYHOST:-}
      RELAYHOST_USERNAME: ${MAIL_RELAY_USER:-}
      RELAYHOST_PASSWORD: ${MAIL_RELAY_PASSWORD:-}
      POSTFIX_message_size_limit: "26214400"
    volumes:
      - mail_data:/var/spool/postfix
      # DKIM keys. Generate with `opendkim-genkey` and mount the key dir here.
      - ./mail/dkim:/etc/opendkim/keys:ro
    expose:
      - "587"
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - upload_buffer:/tmp/course-uploads
    labels:
      # Daily cold backup at 03:17 UTC (offset to avoid the global :00 hammer)
      ofelia.enabled: "true"
      ofelia.job-exec.backup.schedule: "17 17 3 * * *"
      ofelia.job-exec.backup.command: "python -m scripts.backup_to_glacier"

  worker:
    build: ./backend
    env_file: .env
    # Override entrypoint: workers don't run alembic (the api does that on boot).
    entrypoint: []
    command: ["arq", "app.worker.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_buffer:/tmp/course-uploads
    restart: unless-stopped

  ofelia:
    image: mcuadros/ofelia:0.3.13
    depends_on:
      - api
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - api
    restart: unless-stopped
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Make $VAR placeholders in provisioning YAML resolve to env vars at startup.
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    expose:
      - "3000"

  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    expose:
      - "3100"

  promtail:
    image: grafana/promtail:3.2.0
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  pgdata: {}
  caddy_data: {}
  caddy_config: {}
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}
  upload_buffer: {}
  mail_data: {}
