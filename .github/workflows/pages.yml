name: Deploy frontend (Cloudflare Pages)

# Builds the Next.js app with @cloudflare/next-on-pages and pushes the result
# to a Cloudflare Pages project. The Pages project is named "course-platform"
# (matches frontend/wrangler.toml) and lives in the Cloudflare account whose
# ID + API token are stored as repo secrets.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Pages — Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — long hex string from the account home page
#
# Required repo variable (Settings → Variables → Actions):
#   NEXT_PUBLIC_API_BASE   — public URL of the production FastAPI backend,
#                            e.g. https://api.example.com (no trailing slash)
#
# CORS reminder: the API server must include the Pages URL in its
# CORS_ORIGINS env var (eg https://course-platform.pages.dev or your custom
# domain) — otherwise the browser will block every request.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build (next-on-pages)
        env:
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}
        run: npm run pages:build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy .vercel/output/static --project-name=course-platform --branch=${{ github.head_ref || github.ref_name }}
