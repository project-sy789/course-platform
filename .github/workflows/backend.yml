name: backend

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: course
          POSTGRES_PASSWORD: course
          POSTGRES_DB: course
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U course"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://course:course@localhost:5432/course_test
      DATABASE_URL: postgresql+psycopg://course:course@localhost:5432/course
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install Python deps
        working-directory: backend
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt

      - name: Create test database
        run: |
          PGPASSWORD=course psql -h localhost -U course -d course \
            -c "CREATE DATABASE course_test;"

      - name: Run pytest
        working-directory: backend
        run: pytest -v --tb=short
